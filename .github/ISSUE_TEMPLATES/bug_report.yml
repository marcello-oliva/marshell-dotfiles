name: Bug report
description: Report a problem or unexpected behaviour
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        Please provide enough information to understand the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue and how to reproduce it.
      placeholder: |
        What happened?
        What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any relevant information.
      placeholder: |
        Logs, screenshots, system information, or anything else that may help.
    validations:
      required: false
